name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search open issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or gap. The more concrete, the better.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketches, examples, or API ideas are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you prefer this one.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (parser / analyzer / API)
        - Frontend (UI / canvas / diff view)
        - CI report (rake task / reporters)
        - Documentation
        - Other
    validations:
      required: true
