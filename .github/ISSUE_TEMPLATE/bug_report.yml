name: Bug report
description: Something is not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search open issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Mount the engine at `/migflow`
        2. Open a migration with ...
        3. See error
    validations:
      required: true

  - type: input
    id: ruby
    attributes:
      label: Ruby version
      placeholder: "3.3.0"
    validations:
      required: true

  - type: input
    id: rails
    attributes:
      label: Rails version
      placeholder: "7.1.3"
    validations:
      required: true

  - type: input
    id: migflow
    attributes:
      label: Migflow version / commit
      placeholder: "0.1.0 or git SHA"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text
